<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>San Marino · Calendário de Conteúdo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{slate:{950:'#020817'}}},fontFamily:{sans:["DM Sans","system-ui","sans-serif"],mono:["DM Mono","monospace"]}}}}</script>
<style>
*{box-sizing:border-box;}
body{margin:0;background:#020817;font-family:'DM Sans',system-ui,sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
select option{background:#1e293b;color:#e2e8f0;}
textarea{resize:none;}
.slide-in{animation:slideIn .2s ease-out;}
@keyframes slideIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.fade-in{animation:fadeIn .15s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.4);}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── PALETA / ESTILOS ─────────────────────────────────────────
const TIPO_STYLE = {
  REEL:      { bg:"bg-violet-500/20", border:"border-violet-500/40", text:"text-violet-300",  dot:"bg-violet-400", badge:"bg-violet-500/15 text-violet-300 border-violet-500/30" },
  CARROSSEL: { bg:"bg-amber-500/20",  border:"border-amber-500/40",  text:"text-amber-300",   dot:"bg-amber-400",  badge:"bg-amber-500/15 text-amber-300 border-amber-500/30" },
  FOTO:      { bg:"bg-emerald-500/20",border:"border-emerald-500/40",text:"text-emerald-300", dot:"bg-emerald-400",badge:"bg-emerald-500/15 text-emerald-300 border-emerald-500/30" },
  SERIE:     { bg:"bg-pink-500/20",   border:"border-pink-500/40",   text:"text-pink-300",    dot:"bg-pink-400",   badge:"bg-pink-500/15 text-pink-300 border-pink-500/30" },
  BOOST:     { bg:"bg-red-500/20",    border:"border-red-500/40",    text:"text-red-300",     dot:"bg-red-400",    badge:"bg-red-500/15 text-red-300 border-red-500/30" },
  STORIES:   { bg:"bg-sky-500/20",    border:"border-sky-500/40",    text:"text-sky-300",     dot:"bg-sky-400",    badge:"bg-sky-500/15 text-sky-300 border-sky-500/30" },
};

const STATUS_STYLE = {
  agendado:    { label:"Agendado",    dot:"bg-slate-500",   text:"text-slate-400",   badge:"bg-slate-700/60 text-slate-400 border-slate-600" },
  publicado:   { label:"Publicado",   dot:"bg-emerald-400", text:"text-emerald-300", badge:"bg-emerald-500/15 text-emerald-300 border-emerald-500/30" },
  boost_ativo: { label:"Boost ativo", dot:"bg-red-400",     text:"text-red-300",     badge:"bg-red-500/15 text-red-300 border-red-500/30" },
  pendente:    { label:"Pendente",    dot:"bg-orange-400",  text:"text-orange-300",  badge:"bg-orange-500/15 text-orange-300 border-orange-500/30" },
};

const QUEM_LABEL = {
  alexandre:  { label:"Alexandre", color:"text-blue-300",    dot:"bg-blue-400"    },
  vinicius:   { label:"Vinicius",  color:"text-cyan-300",    dot:"bg-cyan-400"    },
  so_carro:   { label:"Só carro",  color:"text-slate-400",   dot:"bg-slate-500"   },
  sem_pessoa: { label:"—",         color:"text-slate-600",   dot:"bg-slate-700"   },
};

const TIPO_OPTIONS = ["REEL","CARROSSEL","FOTO","SERIE","BOOST","STORIES"];
const QUEM_OPTIONS = ["alexandre","vinicius","so_carro","sem_pessoa"];

// ─── GERAÇÃO DAS DUAS SEMANAS ─────────────────────────────────
// Semana 1 começa na segunda-feira mais próxima de hoje ou na próxima semana
function getWeekDates(baseMonday) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(baseMonday);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  return days;
}

function getBaseMonday() {
  // Semana que contém 01/04/2026 — começa na seg 30/03/2026
  const d = new Date(2026, 2, 30); // mês 2 = março (0-indexed)
  d.setHours(0,0,0,0);
  return d;
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function formatDateBR(iso) {
  const [y,m,di] = iso.split("-");
  return `${di}/${m}`;
}

const DAY_NAMES = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const DAY_NAMES_FULL = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const MONTH_NAMES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ─── GERADOR DE ID ─────────────────────────────────────────────
let _idCount = 0;
function genId() { return `post_${Date.now()}_${_idCount++}`; }

const STORAGE_KEY = "sm_calendario_posts";
const STORAGE_WEEK_KEY = "sm_calendario_week";

function loadPosts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function savePosts(posts) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); } catch {}
}

function loadWeekOffset() {
  try {
    const raw = localStorage.getItem(STORAGE_WEEK_KEY);
    return raw ? parseInt(raw, 10) : 0;
  } catch { return 0; }
}

function saveWeekOffset(offset) {
  try { localStorage.setItem(STORAGE_WEEK_KEY, String(offset)); } catch {}
}

// ─── APP PRINCIPAL ─────────────────────────────────────────────
function App() {
  // weekOffset: número de semanas a partir da semana-base (para navegação)
  const [weekOffset, setWeekOffset] = useState(() => loadWeekOffset());

  const baseMonday = getBaseMonday(); // sempre a referência fixa: semana de 01/04/2026
  const week1Start = new Date(baseMonday);
  week1Start.setDate(week1Start.getDate() + weekOffset * 14);
  const week2Start = new Date(week1Start);
  week2Start.setDate(week2Start.getDate() + 7);

  const week1Days = getWeekDates(week1Start);
  const week2Days = getWeekDates(week2Start);

  // Estado: posts por data — carregado do localStorage
  const [posts, setPosts] = useState(() => loadPosts());
  // Post selecionado para o painel lateral
  const [selected, setSelected] = useState(null); // { postId, date }
  // Novo post modal
  const [addModal, setAddModal] = useState(null); // date string
  // Confirm clear
  const [confirmClear, setConfirmClear] = useState(false);

  // Form de detalhe
  const [detail, setDetail] = useState(null); // objeto editável do post

  const today = toISO(new Date());

  // Persistir sempre que posts mudar
  useEffect(() => { savePosts(posts); }, [posts]);
  // Persistir offset de semana
  useEffect(() => { saveWeekOffset(weekOffset); }, [weekOffset]);

  // Quando selecionar um post, carrega no detail
  useEffect(() => {
    if (selected) {
      const p = (posts[selected.date] || []).find(p => p.id === selected.postId);
      if (p) setDetail({ ...p });
      else setSelected(null);
    }
  }, [selected, posts]);

  // Adicionar post
  const addPost = (date, formData) => {
    const newPost = {
      id: genId(),
      date,
      tipo: formData.tipo || "REEL",
      quem: formData.quem || "sem_pessoa",
      titulo: formData.titulo || "Novo conteúdo",
      horario: formData.horario || "18h",
      status: "agendado",
      // Campos de detalhe
      descricao: "",
      legenda: "",
      referencias: [],
      notas: "",
      caption_ref: "",
    };
    setPosts(prev => ({
      ...prev,
      [date]: [...(prev[date] || []), newPost]
    }));
    setAddModal(null);
  };

  // Atualizar post
  const updatePost = (updated) => {
    setPosts(prev => ({
      ...prev,
      [updated.date]: (prev[updated.date] || []).map(p => p.id === updated.id ? { ...updated } : p)
    }));
    setDetail({ ...updated });
  };

  // Deletar post
  const deletePost = (date, id) => {
    setPosts(prev => ({
      ...prev,
      [date]: (prev[date] || []).filter(p => p.id !== id)
    }));
    if (selected && selected.postId === id) {
      setSelected(null);
      setDetail(null);
    }
  };

  // Ciclar status
  const cycleStatus = (date, id) => {
    const order = ["agendado","publicado","boost_ativo","pendente"];
    setPosts(prev => ({
      ...prev,
      [date]: (prev[date] || []).map(p => {
        if (p.id !== id) return p;
        const i = order.indexOf(p.status);
        return { ...p, status: order[(i+1) % order.length] };
      })
    }));
  };

  const selectedPost = selected
    ? (posts[selected.date] || []).find(p => p.id === selected.postId)
    : null;

  const allDays = [...week1Days, ...week2Days];
  const totalPosts = allDays.reduce((acc, d) => acc + (posts[toISO(d)] || []).length, 0);
  const publishedPosts = allDays.reduce((acc, d) => {
    return acc + (posts[toISO(d)] || []).filter(p => p.status === "publicado").length;
  }, 0);

  const clearAll = () => {
    setPosts({});
    setSelected(null);
    setDetail(null);
    setConfirmClear(false);
  };

  // Labels das semanas para o header
  const fmtWeekRange = (days) => {
    const s = days[0], e = days[days.length-1];
    return `${s.getDate()} ${MONTH_NAMES[s.getMonth()]} – ${e.getDate()} ${MONTH_NAMES[e.getMonth()]}`;
  };

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col" style={{fontFamily:"'DM Sans',system-ui,sans-serif"}}>

      {/* ── HEADER ── */}
      <header className="sticky top-0 z-30 bg-slate-950/95 backdrop-blur border-b border-slate-800">
        <div className="flex items-center justify-between px-6 py-3 gap-4 flex-wrap">
          <div className="flex items-center gap-4">
            <div className="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center font-black text-slate-900 text-xs flex-shrink-0">SM</div>
            <div>
              <div className="font-bold text-sm text-slate-100 leading-tight">San Marino Veículos</div>
              <div className="text-[10px] font-mono text-slate-500">
                {fmtWeekRange(week1Days)} &nbsp;·&nbsp; {fmtWeekRange(week2Days)}
              </div>
            </div>
          </div>

          <div className="flex items-center gap-3 flex-wrap">
            {/* Navegação de período */}
            <div className="flex items-center gap-1 bg-slate-800/60 border border-slate-700 rounded-lg p-0.5">
              <button
                onClick={() => { setWeekOffset(w => w - 1); setSelected(null); setDetail(null); }}
                className="w-7 h-7 flex items-center justify-center rounded text-slate-400 hover:text-slate-100 hover:bg-slate-700 transition-colors text-sm"
                title="Período anterior"
              >‹</button>
              <button
                onClick={() => { setWeekOffset(0); setSelected(null); setDetail(null); }}
                className="px-2 py-1 text-[10px] font-mono text-slate-400 hover:text-amber-300 transition-colors"
                title="Voltar para semana atual"
              >{weekOffset === 0 ? "Agora" : weekOffset > 0 ? `+${weekOffset*2}sem` : `${weekOffset*2}sem`}</button>
              <button
                onClick={() => { setWeekOffset(w => w + 1); setSelected(null); setDetail(null); }}
                className="w-7 h-7 flex items-center justify-center rounded text-slate-400 hover:text-slate-100 hover:bg-slate-700 transition-colors text-sm"
                title="Próximo período"
              >›</button>
            </div>

            <div className="flex gap-3 text-xs font-mono">
              <span className="text-slate-500">{totalPosts} posts</span>
              <span className="text-emerald-400">{publishedPosts} pub.</span>
            </div>

            {/* Legend mini */}
            <div className="hidden lg:flex gap-1.5">
              {Object.entries(TIPO_STYLE).map(([tipo, s]) => (
                <div key={tipo} className={`flex items-center gap-1 px-2 py-0.5 rounded-full border text-[9px] font-bold ${s.bg} ${s.border} ${s.text}`}>
                  <div className={`w-1 h-1 rounded-full ${s.dot}`}/>{tipo}
                </div>
              ))}
            </div>

            {/* Clear data */}
            {!confirmClear ? (
              <button
                onClick={() => setConfirmClear(true)}
                className="text-[10px] text-slate-700 hover:text-slate-500 font-mono transition-colors px-1"
                title="Limpar todos os dados"
              >limpar</button>
            ) : (
              <div className="flex items-center gap-1">
                <span className="text-[10px] text-red-400 font-mono">Tem certeza?</span>
                <button onClick={clearAll} className="text-[10px] font-bold text-red-400 hover:text-red-300 px-1.5 py-0.5 rounded border border-red-500/30 bg-red-500/10 transition-colors">Sim</button>
                <button onClick={() => setConfirmClear(false)} className="text-[10px] text-slate-500 hover:text-slate-300 px-1 transition-colors">Não</button>
              </div>
            )}

            {/* Salvo indicator */}
            <div className="flex items-center gap-1 text-[9px] font-mono text-slate-700">
              <div className="w-1 h-1 rounded-full bg-emerald-600"/>salvo
            </div>
          </div>
        </div>
      </header>

      {/* ── BODY: CALENDÁRIO + PAINEL ── */}
      <div className="flex flex-1 min-h-0">

        {/* ── CALENDÁRIO ── */}
        <div className={`flex-1 min-w-0 overflow-y-auto p-5 transition-all duration-300 ${selected ? "lg:mr-0" : ""}`}>

          {/* Semana 1 */}
          <WeekGrid
            label="Semana 1"
            days={week1Days}
            posts={posts}
            today={today}
            selected={selected}
            onSelectPost={(date, id) => setSelected({ date, postId: id })}
            onAddPost={(date) => setAddModal(date)}
            onCycleStatus={cycleStatus}
          />

          <div className="my-4 border-t border-slate-800/60" />

          {/* Semana 2 */}
          <WeekGrid
            label="Semana 2"
            days={week2Days}
            posts={posts}
            today={today}
            selected={selected}
            onSelectPost={(date, id) => setSelected({ date, postId: id })}
            onAddPost={(date) => setAddModal(date)}
            onCycleStatus={cycleStatus}
          />

        </div>

        {/* ── PAINEL LATERAL ── */}
        {selected && detail && (
          <aside className="w-full max-w-sm flex-shrink-0 border-l border-slate-800 bg-slate-900/60 flex flex-col slide-in overflow-y-auto"
            style={{minHeight:"calc(100vh - 57px)",maxHeight:"calc(100vh - 57px)",position:"sticky",top:"57px"}}>
            <DetailPanel
              post={detail}
              onUpdate={updatePost}
              onClose={() => { setSelected(null); setDetail(null); }}
              onDelete={() => deletePost(detail.date, detail.id)}
              onCycleStatus={() => cycleStatus(detail.date, detail.id)}
            />
          </aside>
        )}

      </div>

      {/* ── MODAL ADICIONAR POST ── */}
      {addModal && (
        <AddPostModal
          date={addModal}
          onAdd={(data) => addPost(addModal, data)}
          onClose={() => setAddModal(null)}
        />
      )}

    </div>
  );
}

// ─── GRADE DE UMA SEMANA ─────────────────────────────────────
function WeekGrid({ label, days, posts, today, selected, onSelectPost, onAddPost, onCycleStatus }) {
  const startDate = days[0];
  const endDate   = days[days.length-1];
  const weekLabel = `${startDate.getDate()} ${MONTH_NAMES[startDate.getMonth()]} → ${endDate.getDate()} ${MONTH_NAMES[endDate.getMonth()]}`;

  return (
    <div>
      {/* Week header */}
      <div className="flex items-center gap-3 mb-3">
        <div className="text-xs font-bold text-amber-400 font-mono uppercase tracking-widest">{label}</div>
        <div className="text-xs text-slate-600 font-mono">{weekLabel}</div>
      </div>

      {/* Grid */}
      <div className="grid grid-cols-7 gap-1.5">
        {days.map((d, i) => {
          const iso = toISO(d);
          const dayPosts = posts[iso] || [];
          const isToday = iso === today;
          const isWeekend = d.getDay() === 0 || d.getDay() === 6;

          return (
            <div key={iso}
              className={`rounded-xl border transition-colors min-h-28 flex flex-col ${
                isWeekend
                  ? "bg-slate-900/30 border-slate-800/50"
                  : "bg-slate-900/50 border-slate-800/80"
              }`}
            >
              {/* Day header */}
              <div className="flex items-center justify-between px-2 pt-2 pb-1.5 border-b border-slate-800/60">
                <div className="flex items-center gap-1.5">
                  <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${
                    isToday ? "bg-amber-500 text-slate-900" : "text-slate-400"
                  }`}>{d.getDate()}</div>
                  <span className={`text-[9px] font-bold uppercase tracking-widest ${
                    isWeekend ? "text-slate-600" : "text-slate-500"
                  }`}>{DAY_NAMES[d.getDay()]}</span>
                </div>
                <button
                  onClick={() => onAddPost(iso)}
                  className="w-5 h-5 rounded flex items-center justify-center text-slate-600 hover:text-amber-400 hover:bg-amber-500/10 transition-colors text-sm leading-none"
                  title="Adicionar conteúdo"
                >+</button>
              </div>

              {/* Posts */}
              <div className="flex-1 p-1 space-y-0.5">
                {dayPosts.map(post => {
                  const ts = TIPO_STYLE[post.tipo] || TIPO_STYLE.FOTO;
                  const ss = STATUS_STYLE[post.status] || STATUS_STYLE.agendado;
                  const qs = QUEM_LABEL[post.quem] || QUEM_LABEL.sem_pessoa;
                  const isSelected = selected && selected.postId === post.id;
                  return (
                    <div
                      key={post.id}
                      onClick={() => onSelectPost(iso, post.id)}
                      className={`rounded cursor-pointer px-1.5 py-1 border transition-all hover:opacity-90 ${ts.bg} ${ts.border} ${
                        isSelected ? "ring-1 ring-amber-400/60 ring-offset-1 ring-offset-slate-950" : ""
                      }`}
                    >
                      <div className="flex items-center gap-1 mb-0.5">
                        <div className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${ts.dot}`}/>
                        <span className={`text-[9px] font-bold uppercase leading-none ${ts.text}`}>{post.tipo}</span>
                        {post.quem !== "sem_pessoa" && (
                          <span className={`text-[9px] ml-auto font-medium leading-none ${qs.color}`}>{QUEM_LABEL[post.quem]?.label?.slice(0,3)}</span>
                        )}
                      </div>
                      <div className="text-[9px] text-slate-400 leading-tight truncate">{post.titulo}</div>
                      <div className="flex items-center justify-between mt-0.5">
                        <span className="text-[8px] font-mono text-slate-600">{post.horario}</span>
                        <div
                          title={ss.label}
                          onClick={e => { e.stopPropagation(); onCycleStatus(iso, post.id); }}
                          className={`w-1.5 h-1.5 rounded-full ${ss.dot} cursor-pointer hover:scale-125 transition-transform`}
                        />
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Empty state */}
              {dayPosts.length === 0 && (
                <div className="flex-1 flex items-center justify-center pb-3">
                  <button
                    onClick={() => onAddPost(iso)}
                    className="text-[9px] text-slate-700 hover:text-slate-500 transition-colors"
                  >+ adicionar</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── PAINEL DE DETALHE ─────────────────────────────────────────
function DetailPanel({ post, onUpdate, onClose, onDelete, onCycleStatus }) {
  const [localPost, setLocalPost] = useState({ ...post });
  const [newRef, setNewRef] = useState({ label: "", url: "" });
  const [addingRef, setAddingRef] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(() => { setLocalPost({ ...post }); }, [post.id]);

  const ts = TIPO_STYLE[localPost.tipo] || TIPO_STYLE.FOTO;
  const ss = STATUS_STYLE[localPost.status] || STATUS_STYLE.agendado;

  const set = (key, val) => setLocalPost(p => ({ ...p, [key]: val }));

  const save = () => {
    onUpdate({ ...localPost });
    setSaved(true);
    setTimeout(() => setSaved(false), 1500);
  };

  const addRef = () => {
    if (!newRef.url) return;
    const refs = [...(localPost.referencias || []), { ...newRef, id: genId() }];
    setLocalPost(p => ({ ...p, referencias: refs }));
    setNewRef({ label: "", url: "" });
    setAddingRef(false);
  };

  const removeRef = (id) => {
    setLocalPost(p => ({ ...p, referencias: (p.referencias || []).filter(r => r.id !== id) }));
  };

  const formattedDate = `${DAY_NAMES_FULL[new Date(localPost.date + "T12:00:00").getDay()]}, ${formatDateBR(localPost.date)}`;

  return (
    <div className="flex flex-col h-full">
      {/* Panel header */}
      <div className="px-4 py-3 border-b border-slate-800 flex items-center justify-between flex-shrink-0">
        <div className="flex items-center gap-2">
          <div className={`w-2 h-2 rounded-full ${ts.dot}`}/>
          <span className={`text-xs font-bold uppercase tracking-widest ${ts.text}`}>{localPost.tipo}</span>
          <span className="text-xs text-slate-600 font-mono">{formattedDate}</span>
        </div>
        <div className="flex items-center gap-1">
          <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded hover:bg-slate-800 text-slate-500 hover:text-slate-300 text-lg leading-none transition-colors">×</button>
        </div>
      </div>

      {/* Panel body — scrollável */}
      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-5">

        {/* Título */}
        <div>
          <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Título</label>
          <input
            type="text"
            value={localPost.titulo}
            onChange={e => set("titulo", e.target.value)}
            className="w-full bg-slate-800/60 border border-slate-700 text-slate-100 text-sm px-3 py-2 rounded-lg outline-none focus:border-amber-500/60 transition-colors"
            placeholder="Título do conteúdo"
          />
        </div>

        {/* Tipo + Quem */}
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Tipo</label>
            <select
              value={localPost.tipo}
              onChange={e => set("tipo", e.target.value)}
              className="w-full bg-slate-800/60 border border-slate-700 text-slate-200 text-xs px-2 py-2 rounded-lg outline-none focus:border-amber-500/60"
            >
              {TIPO_OPTIONS.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Responsável</label>
            <select
              value={localPost.quem}
              onChange={e => set("quem", e.target.value)}
              className="w-full bg-slate-800/60 border border-slate-700 text-slate-200 text-xs px-2 py-2 rounded-lg outline-none focus:border-amber-500/60"
            >
              {QUEM_OPTIONS.map(q => <option key={q} value={q}>{QUEM_LABEL[q].label}</option>)}
            </select>
          </div>
        </div>

        {/* Horário + Status */}
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Horário</label>
            <input
              type="text"
              value={localPost.horario}
              onChange={e => set("horario", e.target.value)}
              className="w-full bg-slate-800/60 border border-slate-700 text-slate-200 text-xs px-2 py-2 rounded-lg outline-none focus:border-amber-500/60"
              placeholder="ex: 18h"
            />
          </div>
          <div>
            <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Status</label>
            <button
              onClick={onCycleStatus}
              className={`w-full flex items-center justify-center gap-1.5 px-2 py-2 rounded-lg border text-xs font-semibold transition-all ${ss.badge}`}
            >
              <div className={`w-1.5 h-1.5 rounded-full ${ss.dot}`}/>{ss.label}
            </button>
          </div>
        </div>

        {/* Descrição do conteúdo */}
        <div>
          <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Descrição / Briefing</label>
          <textarea
            rows={4}
            value={localPost.descricao}
            onChange={e => set("descricao", e.target.value)}
            className="w-full bg-slate-800/60 border border-slate-700 text-slate-300 text-xs px-3 py-2 rounded-lg outline-none focus:border-amber-500/60 transition-colors leading-relaxed"
            placeholder="Descreva o conteúdo, objetivo, tom, ângulos, informações importantes..."
          />
        </div>

        {/* Legenda / Caption */}
        <div>
          <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Legenda / Caption</label>
          <textarea
            rows={5}
            value={localPost.legenda}
            onChange={e => set("legenda", e.target.value)}
            className="w-full bg-slate-800/60 border border-slate-700 text-slate-300 text-xs px-3 py-2 rounded-lg outline-none focus:border-amber-500/60 transition-colors leading-relaxed font-mono"
            placeholder="Legenda do post, CTAs, hashtags..."
          />
        </div>

        {/* Links de referência */}
        <div>
          <div className="flex items-center justify-between mb-1.5">
            <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500">Referências</label>
            <button
              onClick={() => setAddingRef(a => !a)}
              className="text-[10px] font-bold text-amber-400 hover:text-amber-300 transition-colors"
            >+ Adicionar link</button>
          </div>

          {addingRef && (
            <div className="bg-slate-800/60 border border-slate-700 rounded-lg p-3 mb-2 space-y-2 fade-in">
              <input
                type="text"
                value={newRef.label}
                onChange={e => setNewRef(r => ({...r, label:e.target.value}))}
                placeholder="Nome / descrição (opcional)"
                className="w-full bg-slate-700/60 border border-slate-600 text-slate-200 text-xs px-2 py-1.5 rounded outline-none focus:border-amber-500/60"
              />
              <input
                type="url"
                value={newRef.url}
                onChange={e => setNewRef(r => ({...r, url:e.target.value}))}
                placeholder="https://..."
                className="w-full bg-slate-700/60 border border-slate-600 text-slate-200 text-xs px-2 py-1.5 rounded outline-none focus:border-amber-500/60"
              />
              <div className="flex gap-2">
                <button
                  onClick={addRef}
                  className="flex-1 bg-amber-500/20 border border-amber-500/40 text-amber-300 text-xs font-bold py-1.5 rounded hover:bg-amber-500/30 transition-colors"
                >Salvar</button>
                <button
                  onClick={() => { setAddingRef(false); setNewRef({label:"",url:""}); }}
                  className="px-3 bg-slate-700 border border-slate-600 text-slate-400 text-xs rounded hover:bg-slate-600 transition-colors"
                >✕</button>
              </div>
            </div>
          )}

          {(localPost.referencias || []).length === 0 && !addingRef && (
            <div className="text-xs text-slate-700 italic">Nenhum link adicionado.</div>
          )}

          <div className="space-y-1.5">
            {(localPost.referencias || []).map(ref => (
              <div key={ref.id} className="flex items-start gap-2 bg-slate-800/40 border border-slate-700/60 rounded-lg px-3 py-2">
                <div className="flex-1 min-w-0">
                  {ref.label && <div className="text-xs text-slate-300 font-medium truncate mb-0.5">{ref.label}</div>}
                  <a
                    href={ref.url}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="text-[10px] text-amber-400 hover:text-amber-300 truncate block font-mono transition-colors"
                  >{ref.url}</a>
                </div>
                <button
                  onClick={() => removeRef(ref.id)}
                  className="text-slate-600 hover:text-red-400 text-xs flex-shrink-0 transition-colors"
                >✕</button>
              </div>
            ))}
          </div>
        </div>

        {/* Notas internas */}
        <div>
          <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Notas internas</label>
          <textarea
            rows={3}
            value={localPost.notas}
            onChange={e => set("notas", e.target.value)}
            className="w-full bg-slate-800/60 border border-slate-700 text-slate-400 text-xs px-3 py-2 rounded-lg outline-none focus:border-amber-500/60 transition-colors leading-relaxed italic"
            placeholder="Observações, pendências, aprovações, ajustes..."
          />
        </div>

      </div>

      {/* Panel footer — ações */}
      <div className="flex-shrink-0 px-4 py-3 border-t border-slate-800 flex items-center justify-between gap-2">
        <button
          onClick={onDelete}
          className="text-xs text-red-500/60 hover:text-red-400 transition-colors px-2 py-1.5"
        >Excluir</button>
        <button
          onClick={save}
          className={`flex-1 text-xs font-bold py-2 rounded-lg border transition-all ${
            saved
              ? "bg-emerald-500/20 border-emerald-500/40 text-emerald-300"
              : "bg-amber-500/20 border-amber-500/40 text-amber-300 hover:bg-amber-500/30"
          }`}
        >{saved ? "✓ Salvo!" : "Salvar alterações"}</button>
      </div>

    </div>
  );
}

// ─── MODAL ADICIONAR POST ─────────────────────────────────────
function AddPostModal({ date, onAdd, onClose }) {
  const [form, setForm] = useState({
    tipo: "REEL",
    quem: "alexandre",
    titulo: "",
    horario: "18h",
  });

  const d = new Date(date + "T12:00:00");
  const label = `${DAY_NAMES_FULL[d.getDay()]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const handleSubmit = () => {
    if (!form.titulo.trim()) return;
    onAdd(form);
  };

  return (
    <div
      className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in"
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
    >
      <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-xs shadow-2xl overflow-hidden slide-in">
        <div className="px-5 py-4 border-b border-slate-800 flex items-center justify-between">
          <div>
            <div className="text-xs font-bold text-amber-400 font-mono uppercase tracking-widest">Novo conteúdo</div>
            <div className="text-xs text-slate-500 mt-0.5">{label}</div>
          </div>
          <button onClick={onClose} className="text-slate-500 hover:text-slate-300 text-xl leading-none">×</button>
        </div>

        <div className="px-5 py-4 space-y-4">
          <div>
            <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Título *</label>
            <input
              type="text"
              value={form.titulo}
              onChange={e => set("titulo", e.target.value)}
              autoFocus
              className="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm px-3 py-2 rounded-lg outline-none focus:border-amber-500/60"
              placeholder="Ex: Papo de Bar Ep. 1"
              onKeyDown={e => e.key === "Enter" && handleSubmit()}
            />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Tipo</label>
              <select value={form.tipo} onChange={e => set("tipo", e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs px-2 py-2 rounded-lg outline-none focus:border-amber-500/60">
                {TIPO_OPTIONS.map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Quem</label>
              <select value={form.quem} onChange={e => set("quem", e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs px-2 py-2 rounded-lg outline-none focus:border-amber-500/60">
                {QUEM_OPTIONS.map(q => <option key={q} value={q}>{QUEM_LABEL[q].label}</option>)}
              </select>
            </div>
          </div>
          <div>
            <label className="text-[10px] font-mono uppercase tracking-widest text-slate-500 block mb-1.5">Horário</label>
            <input
              type="text"
              value={form.horario}
              onChange={e => set("horario", e.target.value)}
              className="w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs px-2 py-2 rounded-lg outline-none focus:border-amber-500/60"
              placeholder="18h"
            />
          </div>
        </div>

        <div className="px-5 pb-5">
          <button
            onClick={handleSubmit}
            disabled={!form.titulo.trim()}
            className="w-full bg-amber-500 hover:bg-amber-400 disabled:opacity-40 disabled:cursor-not-allowed text-slate-900 font-bold text-sm py-2.5 rounded-xl transition-colors"
          >Adicionar conteúdo</button>
        </div>
      </div>
    </div>
  );
}

// ─── RENDER ───────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
